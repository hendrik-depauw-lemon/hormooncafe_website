name: Check licenses

on:
    pull_request:

jobs:
    check-licenses:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20.x'
                  cache: 'yarn'
            - name: Install dependencies
              run: yarn --immutable
            - name: Check licenses
              run: if [[ $(yarn check-licenses) ]]; then exit 1; fi
