default:
    parallel: 5
    retry: 1
    publish: true
    requireModule:
        - ts-node/register
    require:
        - steps/**/*.ts
        - util/**/*.ts
    format:
        - '@cucumber/pretty-formatter'
        - usage-json:usage.json
        - progress
    # Remove?
    # tags: not @Ignore

local:
    parallel: 10
    retry: 0
    publish: true
    requireModule:
        - ts-node/register
    require:
        - steps/**/*.ts
        - util/**/*.ts
    format:
        - '@cucumber/pretty-formatter'

test:
    parallel: 1
    retry: 0
    requireModule:
        - ts-node/register
    require:
        - steps/**/*.ts
        - util/**/*.ts
    format:
        - '@cucumber/pretty-formatter'
